<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  color: white;
  background: #0f2027;
}

/* 🌌 Background */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a2a3a, #000);
  z-index: -1;
}

/* Navbar */
header {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* Sections */
.section {
  min-height: 100vh;
  padding: 100px 40px;
  text-align: center;
}

/* Home */
#home h1 {
  font-size: 40px;
}

#home span {
  color: #00f2fe;
}

/* Glass effect */
.glass {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 30px;
  backdrop-filter: blur(10px);
  margin-top: 20px;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 220px;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px cyan;
}

/* Contact */
input, textarea {
  width: 80%;
  margin: 10px auto;
  padding: 10px;
  border: none;
  border-radius: 10px;
  display: block;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg, #00f2fe, #ff00cc);
  color: white;
  cursor: pointer;
}

/* Responsive */
@media(max-width: 768px) {
  .cards {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>

<body>

<!-- Navbar -->
<header>
  <h2>MyPortfolio</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Home -->
<section id="home" class="section">
  <h1>Hi, I'm <span>Your Name</span></h1>
  <p>Frontend Developer | UI Designer</p>
</section>

<!-- About -->
<section id="about" class="section">
  <div class="glass">
    <h2>About Me</h2>
    <p>I create modern and attractive websites using HTML, CSS, and JavaScript.</p>
  </div>
</section>

<!-- Projects -->
<section id="projects" class="section">
  <h2>My Projects</h2>
  <div class="cards">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<!-- Contact -->
<section id="contact" class="section">
  <div class="glass">
    <h2>Contact Me</h2>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </div>
</section>

</body>
</html>
